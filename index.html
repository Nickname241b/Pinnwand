<head>
    <title>Pinnwand</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div id="container">
        <div id="Header" onclick="getColor()">Pinnwand</div>
        <div id="List">
            <ul>
                <li>Beginning</li>
            </ul>
        </div>
    </div>
<script>
    console.log("Init")
    
    const a = "0123456789abcdef"
    const header = document.getElementById("Header");
    const ul = document.querySelector("ul");
    
    let new_color = "#"
    for (let i = 0; i < 6; i++) {
        new_color += a.charAt(Math.floor(Math.random() * 14))
    }
    document.documentElement.style.setProperty("--primary-color", new_color);

    //sorting of the list
    for (const li of [...ul.children]) {
        if (li.classList.contains("done")) {
            ul.appendChild(li);
        }
    }
    
    function getColor() {
        header.textContent = document.documentElement.style.getPropertyValue("--primary-color");
    }
</script>
</body>
